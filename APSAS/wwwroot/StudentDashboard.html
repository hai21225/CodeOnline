<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODE MASTERY</title>
    <link rel="stylesheet" href="Css/StudentAssignment.css">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="top-nav">
        <div style="width: 50px;"></div>

      
    </nav>

    <main class="main-content">
        <h1 class="page-title">CODE MASTERY</h1>

        <section id="assignments" class="section-container">
            <h2 class="section-subtitle">📝 Bài tập </h2>
            <div class="assignment-grid" id="assignmentContainer"></div>
        </section>

        <section id="submissions" class="section-container">
            <h2 class="section-subtitle">✅ Bài nộp của tôi</h2>
            <div class="submission-grid" id="submissionContainer">
                <p style="color: rgba(255,255,255,0.6)">Đang tải danh sách bài nộp...</p>
            </div>
        </section>
    </main>

    <div id="assignmentModal" class="modal">
        <div class="modal-content">
            <button id="closeModalBtn" class="close-x">×</button>
            <h3 id="modalTitle"></h3>
            <div class="modal-info">
                <p><strong>Mô tả:</strong> <span id="modalDescription"></span></p>
                <p><strong>Testcase mẫu:</strong></p>
                <pre id="modalSampleTestcase" class="sample-box"></pre>
                <div class="meta-info">
                    <span>Độ khó: <b id="modalDifficult"></b></span>
                    <span>Hạn nộp: <b id="modalDeadline"></b></span>
                </div>
            </div>
            <div class="modal-buttons">
                <button id="viewResourceBtn" class="btn-secondary">Xem hướng dẫn</button>
                <button id="doAssignmentBtn" class="btn-primary-glow">Làm bài ngay</button>
            </div>
        </div>
    </div>

    <audio id="notifSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <script src="Js/StudentAssignment.js"></script>
    <script src="Js/Notification.js"></script>
</body>
</html>
