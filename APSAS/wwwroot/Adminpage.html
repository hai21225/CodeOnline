<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Thêm User</title>

    <!-- LINK CSS -->
    <link rel="stylesheet" href="Css/Admin.css">

    <!-- FONT (xịn hơn) -->
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="top-nav">
        <button onclick="window.location.href='DashboardLecturer.html'">
            🎓 Giảng Viên
        </button>

        <button onclick="window.location.href='StudentDashboard.html'">
            📚 Sinh Viên
        </button>
    </div>


    <div class="container">

        <!-- TITLE -->
        <h1> Admin Dashboard</h1>

        <!-- CARD -->
        <div class="card">

            <h2>➕ Thêm Người Dùng</h2>

            <!-- FORM -->
            <form id="addUserForm">

                <!-- USERNAME -->
                <label for="username">Username</label>
                <input id="username" type="text" placeholder="Nhập username..." required>

                <!-- EMAIL -->
                <label for="email">Email</label>
                <input id="email" type="email" placeholder="example@email.com" required>

                <!-- FULLNAME -->
                <label for="fullname">Full Name</label>
                <input id="fullname" type="text" placeholder="Nguyễn Văn A" required>

                <!-- PASSWORD -->
                <label for="password">Password</label>
                <input id="password" type="password" placeholder="••••••••" required>

                <!-- ROLE -->
                <label for="roleid">Role</label>
                <select id="roleid">
                    <option value="1">👑 Admin</option>
                    <option value="2">🎓 Giảng viên</option>
                    <option value="3">📚 Sinh viên</option>
                </select>

                <!-- BUTTON -->
                <button type="submit" id="submitUserBtn">
                    🚀 Thêm User
                </button>

                <!-- MESSAGE -->
                <p id="userMessage" class="message"></p>

            </form>

        </div>
    </div>

</body>
</html>
